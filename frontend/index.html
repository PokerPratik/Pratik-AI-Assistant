<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/p.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Pratik AI Assistant — your personal voice-powered AI chat companion." />
  <title>Pratik AI Assistant</title>
</head>

<body>
  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div id="app">
    <div class="app-container">

      <!-- ── Sidebar ─────────────────────────────────────── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-container">
            <img src="/logo.png" alt="Pratik AI Logo" class="sidebar-logo">
          </div>
        </div>

        <div class="sidebar-content">
          <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
          <div class="history-list">
            <!-- History items will appear here -->
          </div>
        </div>

        <div class="sidebar-footer">
          <button class="settings-btn" id="settings-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Settings
          </button>
        </div>
      </aside>

      <!-- ── Main Chat ───────────────────────────────────── -->
      <main class="chat-main">
        <div class="watermark"></div>

        <header class="chat-header">
          <!-- Hamburger (mobile only) -->
          <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6"  x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>

          <h3 id="current-chat-title">Assistant</h3>
        </header>

        <div id="chat-feed" class="chat-feed">
          <div class="message system">
            <div class="message-bubble system-bubble">
              Hello! I'm the Pratik AI Assistant. How can I help you today?
            </div>
          </div>
        </div>

        <div class="chat-input-container">
          <form id="chat-form" class="chat-form">
            <div id="image-preview-container" class="image-preview-container hidden">
              <img id="image-preview" src="" alt="Preview">
              <button type="button" id="clear-preview-btn" aria-label="Remove image">&times;</button>
            </div>
            <div class="attachment-wrapper">
              <button type="button" class="attachment-btn" id="attachment-btn" aria-label="Add attachment">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
              <div class="attachment-menu hidden" id="attachment-menu">
                <button type="button" id="upload-image-btn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                  Upload Image
                </button>
                <button type="button" id="camera-btn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                  Live Photo
                </button>
              </div>
              <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
              <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
            </div>
            <button type="button" class="mic-btn" id="mic-btn" aria-label="Start voice input" title="Start voice input">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
              </svg>
            </button>
            <input type="text" id="message-input" placeholder="Ask me anything..." autocomplete="off" required />
            <button type="submit" class="send-btn" aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <!-- ── Voice Orb Overlay ────────────────────────────────────── -->
  <div id="orb-container" class="orb-container hidden">
    <div class="orb-visualizer">
      <div class="orb-ring one"></div>
      <div class="orb-ring two"></div>
      <div class="orb-ring three"></div>
      <div class="orb-core"></div>
    </div>
    <div id="orb-status" class="orb-status">Say "Hey Pratik" or tap to speak...</div>
    <div id="orb-transcript" class="orb-transcript"></div>
    <button id="close-orb-btn" class="close-orb-btn" aria-label="Close Hands-Free Mode">&times;</button>
  </div>

  <!-- ── Settings Modal ──────────────────────────────────────── -->
  <div class="modal hidden" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Settings</h2>
        <button class="close-btn" id="close-settings-btn" aria-label="Close settings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <span>Clear All History</span>
          <button class="danger-btn" id="clear-all-btn">Clear</button>
        </div>
        <div class="setting-row">
          <span>AI Voice Assistant</span>
          <label class="toggle-switch" aria-label="Toggle AI voice">
            <input type="checkbox" id="voice-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <span>Voice Persona</span>
          <select id="voice-select" class="theme-select" aria-label="Select voice persona">
            <option value="">Loading voices...</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
